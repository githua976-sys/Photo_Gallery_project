{% extends "Photo_Gallery_App/base.html" %}

{% block content %}

<h2 class="text-2xl font-bold mb-4">
Login
</h2>

<form method="POST">

    {% csrf_token %}

    <input
        type="email"
        name="email"
        placeholder="Email"
        class="border p-2 w-full mb-4"
    >

    <input
        type="password"
        name="password"
        placeholder="Password"
        class="border p-2 w-full mb-4"
    >

    <button class="bg-blue-600 text-white px-4 py-2 rounded">
        Login
    </button>

</form>

{% endblock %}
